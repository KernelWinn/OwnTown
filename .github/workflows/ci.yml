name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: owntown
          POSTGRES_PASSWORD: owntown
          POSTGRES_DB: owntown_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build packages
        run: npx turbo build --filter=./packages/*

      - name: Test API
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://owntown:owntown@localhost:5432/owntown_test
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          ADMIN_JWT_SECRET: ci-test-admin-secret
        run: npm test -- --passWithNoTests

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Build Admin
        working-directory: apps/admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
        run: npm run build
